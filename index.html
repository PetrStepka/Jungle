<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Jungle Neon</title>
<style>
  * { margin: 0; padding: 0; }
  body { background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
  canvas { display: block; background: #0a0a0a; }
</style>
</head>
<body>
<canvas id="game"></canvas>
<script>
// === SETUP ===
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
canvas.width = 960;
canvas.height = 540;

// === CONSTANTS ===
const GRAVITY = 1800;
const PLAYER_SPEED = 260;
const JUMP_FORCE = -620;
const GROUND_Y = 440;

const COLORS = {
  bg: '#0a0a0a',
  player: '#4CAF50',
  bug: '#f44336',
  dino: '#ff5722',
  projectile: '#00BCD4',
  melee: '#FFD700',
  terrain: '#4CAF50',
};

// === GAME STATE ===
let gameState = 'playing';
let score = 0;
let distance = 0;
let highScore = parseInt(localStorage.getItem('jungleNeonHighScore')) || 0;
let screenShake = 0;
let gameTime = 0;

// === INPUT ===
const keys = {};
const GAME_KEYS = ['ArrowLeft', 'ArrowRight', 'ArrowUp', 'z', 'Z', 'x', 'X', 'Enter'];
window.addEventListener('keydown', e => { keys[e.key] = true; if (GAME_KEYS.includes(e.key)) e.preventDefault(); });
window.addEventListener('keyup', e => { keys[e.key] = false; if (GAME_KEYS.includes(e.key)) e.preventDefault(); });

// === CAMERA ===
const camera = { x: 0 };

// === PLAYER ===
const player = {
  x: 200, y: GROUND_Y, w: 24, h: 40,
  vx: 0, vy: 0,
  facing: 1,
  onGround: false,
  lives: 3,
  invincible: 0,
  meleeCooldown: 0,
  meleeTimer: 0,
  shootCooldown: 0,
};

// === TERRAIN ===
let terrainSegments = [];
let terrainNextX = 0;

// === ENEMIES ===
let enemies = [];
let bugSpawnTimer = 0;
let dinoSpawnTimer = 0;

// === PROJECTILES ===
let projectiles = [];

// === PARTICLES ===
let particles = [];

// === TERRAIN GENERATION ===
function generateTerrain() {
  while (terrainNextX < camera.x + canvas.width + 400) {
    const rand = Math.random();
    if (rand < 0.15 && terrainNextX > 300) {
      terrainNextX += 80 + Math.random() * 60;
    } else if (rand < 0.3) {
      const w = 120 + Math.random() * 200;
      terrainSegments.push({ x: terrainNextX, y: GROUND_Y - 40 - Math.random() * 30, w, h: 12 });
      terrainSegments.push({ x: terrainNextX, y: GROUND_Y, w, h: 20 });
      terrainNextX += w;
    } else {
      const w = 150 + Math.random() * 300;
      terrainSegments.push({ x: terrainNextX, y: GROUND_Y, w, h: 20 });
      terrainNextX += w;
    }
  }
  terrainSegments = terrainSegments.filter(s => s.x + s.w > camera.x - 200);
}

// === PARALLAX BACKGROUND ===
const stars = Array.from({ length: 80 }, () => ({
  x: Math.random() * canvas.width * 3,
  y: Math.random() * canvas.height * 0.7,
  size: Math.random() * 2 + 0.5,
  brightness: Math.random() * 0.5 + 0.3,
}));

const bgTrees = Array.from({ length: 30 }, () => ({
  x: Math.random() * canvas.width * 5,
  h: 60 + Math.random() * 80,
  w: 20 + Math.random() * 15,
}));

const fgPlants = Array.from({ length: 40 }, () => ({
  x: Math.random() * canvas.width * 5,
  h: 15 + Math.random() * 30,
  type: Math.random() < 0.5 ? 'fern' : 'vine',
}));

function drawParallax() {
  ctx.save();
  const starOffsetX = camera.x * 0.1;
  stars.forEach(s => {
    const sx = ((s.x - starOffsetX) % (canvas.width * 3) + canvas.width * 3) % (canvas.width * 3);
    if (sx < canvas.width) {
      ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness})`;
      ctx.beginPath();
      ctx.arc(sx, s.y, s.size, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.restore();

  ctx.save();
  ctx.shadowColor = COLORS.terrain;
  ctx.shadowBlur = 6;
  ctx.strokeStyle = COLORS.terrain + '55';
  ctx.lineWidth = 1.5;
  const treeOffsetX = camera.x * 0.4;
  bgTrees.forEach(t => {
    const tx = ((t.x - treeOffsetX) % (canvas.width * 5) + canvas.width * 5) % (canvas.width * 5);
    if (tx > -50 && tx < canvas.width + 50) {
      ctx.beginPath();
      ctx.moveTo(tx, GROUND_Y + 20);
      ctx.lineTo(tx, GROUND_Y + 20 - t.h);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(tx - t.w, GROUND_Y + 20 - t.h * 0.5);
      ctx.lineTo(tx, GROUND_Y + 20 - t.h - 20);
      ctx.lineTo(tx + t.w, GROUND_Y + 20 - t.h * 0.5);
      ctx.closePath();
      ctx.stroke();
    }
  });
  ctx.restore();

  ctx.save();
  ctx.shadowColor = COLORS.terrain;
  ctx.shadowBlur = 4;
  ctx.strokeStyle = COLORS.terrain + '44';
  ctx.lineWidth = 1;
  const plantOffsetX = camera.x * 0.7;
  fgPlants.forEach(p => {
    const px = ((p.x - plantOffsetX) % (canvas.width * 5) + canvas.width * 5) % (canvas.width * 5);
    if (px > -30 && px < canvas.width + 30) {
      if (p.type === 'fern') {
        ctx.beginPath();
        ctx.moveTo(px, GROUND_Y + 20);
        ctx.quadraticCurveTo(px - 10, GROUND_Y + 20 - p.h * 0.6, px - 15, GROUND_Y + 20 - p.h);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(px, GROUND_Y + 20);
        ctx.quadraticCurveTo(px + 10, GROUND_Y + 20 - p.h * 0.6, px + 15, GROUND_Y + 20 - p.h);
        ctx.stroke();
      } else {
        ctx.beginPath();
        ctx.moveTo(px, 0);
        ctx.quadraticCurveTo(px + 8, p.h * 0.5, px - 5, p.h);
        ctx.stroke();
      }
    }
  });
  ctx.restore();
}

// === DRAW PLAYER ===
function drawPlayer() {
  if (player.invincible > 0 && Math.floor(player.invincible * 10) % 2 === 0) return;

  const sx = player.x - camera.x;
  const sy = player.y;
  const f = player.facing;

  ctx.save();
  ctx.shadowColor = COLORS.player;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = COLORS.player;
  ctx.lineWidth = 2;
  ctx.translate(sx + player.w / 2, sy);
  ctx.scale(f, 1);

  ctx.beginPath();
  ctx.arc(0, -30, 8, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, -22);
  ctx.lineTo(0, -4);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(10, -10);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -18);
  ctx.lineTo(-8, -12);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(0, -4);
  ctx.lineTo(7, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(0, -4);
  ctx.lineTo(-7, 0);
  ctx.stroke();

  ctx.restore();

  if (player.meleeTimer > 0) {
    ctx.save();
    ctx.shadowColor = COLORS.melee;
    ctx.shadowBlur = 15;
    ctx.strokeStyle = COLORS.melee;
    ctx.lineWidth = 3;
    const arcX = sx + player.w / 2 + f * 15;
    const arcY = sy - 15;
    const startAngle = f === 1 ? -Math.PI * 0.6 : Math.PI * 0.6;
    const endAngle = f === 1 ? Math.PI * 0.3 : Math.PI + Math.PI * 0.3;
    ctx.beginPath();
    ctx.arc(arcX, arcY, 28, startAngle, endAngle, f === -1);
    ctx.stroke();
    ctx.restore();
  }
}

// === DRAW ROHÁČ (BEETLE) ===
function drawBeetle(enemy) {
  const sx = enemy.x - camera.x;
  const sy = enemy.y;
  const f = enemy.facing || -1;

  ctx.save();
  ctx.shadowColor = COLORS.bug;
  ctx.shadowBlur = 8;
  ctx.strokeStyle = COLORS.bug;
  ctx.lineWidth = 2;
  ctx.translate(sx, sy);

  ctx.beginPath();
  ctx.ellipse(0, -8, 14, 8, 0, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(f * 10, -12);
  ctx.lineTo(f * 22, -20);
  ctx.lineTo(f * 18, -14);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(f * 10, -10);
  ctx.lineTo(f * 20, -16);
  ctx.stroke();

  for (let i = -1; i <= 1; i++) {
    const lx = i * 8;
    ctx.beginPath();
    ctx.moveTo(lx, -2);
    ctx.lineTo(lx - 6, 4);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(lx, -2);
    ctx.lineTo(lx + 6, 4);
    ctx.stroke();
  }

  ctx.restore();
}

// === DRAW T-REX ===
function drawTRex(enemy) {
  const sx = enemy.x - camera.x;
  const sy = enemy.y;
  const f = enemy.facing || -1;

  ctx.save();
  ctx.shadowColor = COLORS.dino;
  ctx.shadowBlur = 12;
  ctx.strokeStyle = COLORS.dino;
  ctx.lineWidth = 2.5;
  ctx.translate(sx, sy);
  ctx.scale(f * -1, 1);

  ctx.beginPath();
  ctx.moveTo(20, -55);
  ctx.lineTo(38, -52);
  ctx.lineTo(40, -45);
  ctx.lineTo(38, -40);
  ctx.lineTo(20, -42);
  ctx.closePath();
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(38, -45);
  ctx.lineTo(42, -42);
  ctx.lineTo(38, -40);
  ctx.stroke();

  ctx.lineWidth = 1;
  for (let i = 0; i < 3; i++) {
    const tx = 30 + i * 4;
    ctx.beginPath();
    ctx.moveTo(tx, -40);
    ctx.lineTo(tx + 1, -37);
    ctx.stroke();
  }
  ctx.lineWidth = 2.5;

  ctx.beginPath();
  ctx.arc(30, -50, 2, 0, Math.PI * 2);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(20, -52);
  ctx.quadraticCurveTo(10, -50, 5, -42);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(20, -42);
  ctx.quadraticCurveTo(12, -40, 5, -35);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(5, -42);
  ctx.quadraticCurveTo(-5, -48, -20, -42);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(5, -35);
  ctx.quadraticCurveTo(-5, -25, -20, -30);
  ctx.stroke();

  ctx.beginPath();
  ctx.moveTo(-20, -42);
  ctx.quadraticCurveTo(-35, -45, -45, -38);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-20, -30);
  ctx.quadraticCurveTo(-32, -30, -45, -38);
  ctx.stroke();

  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(8, -35);
  ctx.lineTo(14, -28);
  ctx.lineTo(12, -26);
  ctx.stroke();

  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(-10, -30);
  ctx.lineTo(-8, -15);
  ctx.lineTo(-3, -5);
  ctx.lineTo(-8, 0);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-18, -30);
  ctx.lineTo(-20, -15);
  ctx.lineTo(-15, -5);
  ctx.lineTo(-20, 0);
  ctx.stroke();

  ctx.restore();
}

// === DRAW TERRAIN ===
function drawTerrain() {
  ctx.save();
  ctx.shadowColor = COLORS.terrain;
  ctx.shadowBlur = 6;
  ctx.strokeStyle = COLORS.terrain + '88';
  ctx.lineWidth = 2;

  terrainSegments.forEach(seg => {
    const sx = seg.x - camera.x;
    if (sx + seg.w < -10 || sx > canvas.width + 10) return;
    ctx.strokeRect(sx, seg.y, seg.w, seg.h);
  });
  ctx.restore();
}

// === DRAW PROJECTILES ===
function drawProjectiles() {
  ctx.save();
  ctx.shadowColor = COLORS.projectile;
  ctx.shadowBlur = 10;

  projectiles.forEach(p => {
    const sx = p.x - camera.x;
    for (let i = 1; i <= 3; i++) {
      const alpha = (1 - i * 0.3).toFixed(1);
      ctx.fillStyle = `rgba(0, 188, 212, ${alpha})`;
      ctx.fillRect(sx - p.dir * i * 8, p.y - 2, 10, 4);
    }
    ctx.fillStyle = COLORS.projectile;
    ctx.fillRect(sx, p.y - 3, 12, 6);
  });
  ctx.restore();
}

// === DRAW PARTICLES ===
function drawParticles() {
  particles.forEach(p => {
    ctx.save();
    ctx.shadowColor = p.color;
    ctx.shadowBlur = 6;
    ctx.fillStyle = p.color + Math.floor(p.life * 255).toString(16).padStart(2, '0');
    ctx.beginPath();
    ctx.arc(p.x - camera.x, p.y, p.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  });
}

// === DRAW HUD ===
function drawHUD() {
  ctx.save();
  ctx.shadowBlur = 0;

  ctx.shadowColor = '#f44336';
  ctx.shadowBlur = 8;
  ctx.fillStyle = '#f44336';
  ctx.font = '20px sans-serif';
  for (let i = 0; i < player.lives; i++) {
    ctx.fillText('\u2665', 20 + i * 28, 30);
  }

  ctx.shadowColor = COLORS.projectile;
  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS.projectile;
  ctx.font = 'bold 20px monospace';
  ctx.textAlign = 'center';
  ctx.fillText(`${Math.floor(score)}`, canvas.width / 2, 30);

  ctx.shadowColor = COLORS.player;
  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS.player;
  ctx.textAlign = 'right';
  ctx.font = '16px monospace';
  ctx.fillText(`${Math.floor(distance)}m`, canvas.width - 20, 30);

  ctx.textAlign = 'left';
  ctx.restore();
}

// === DRAW GAME OVER ===
function drawGameOver() {
  ctx.save();
  ctx.fillStyle = 'rgba(0, 0, 0, 0.7)';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.textAlign = 'center';

  ctx.shadowColor = COLORS.dino;
  ctx.shadowBlur = 20;
  ctx.fillStyle = COLORS.dino;
  ctx.font = 'bold 48px monospace';
  ctx.fillText('GAME OVER', canvas.width / 2, 200);

  ctx.shadowColor = COLORS.projectile;
  ctx.shadowBlur = 12;
  ctx.fillStyle = COLORS.projectile;
  ctx.font = 'bold 28px monospace';
  ctx.fillText(`Score: ${Math.floor(score)}`, canvas.width / 2, 270);

  ctx.shadowColor = COLORS.melee;
  ctx.shadowBlur = 10;
  ctx.fillStyle = COLORS.melee;
  ctx.font = '20px monospace';
  ctx.fillText(`High Score: ${Math.floor(highScore)}`, canvas.width / 2, 310);

  ctx.shadowColor = COLORS.player;
  ctx.shadowBlur = 8;
  ctx.fillStyle = COLORS.player;
  ctx.font = '18px monospace';
  ctx.fillText('Press ENTER to restart', canvas.width / 2, 380);

  ctx.textAlign = 'left';
  ctx.restore();
}

// === SPAWN ENEMIES ===
function spawnEnemies(dt) {
  let bugInterval;
  if (distance < 500) bugInterval = 2.0;
  else if (distance < 1500) bugInterval = 1.2;
  else bugInterval = 0.6;

  bugSpawnTimer -= dt;
  if (bugSpawnTimer <= 0) {
    bugSpawnTimer = bugInterval + Math.random() * bugInterval * 0.5;
    const count = distance > 1500 && Math.random() < 0.4 ? 3 : 1;
    for (let i = 0; i < count; i++) {
      enemies.push({
        type: 'bug',
        x: camera.x + canvas.width + 50 + i * 40,
        y: GROUND_Y,
        w: 28, h: 16,
        hp: 1,
        speed: 150 + Math.random() * 80,
        facing: -1,
        points: 10,
      });
    }
  }

  if (gameTime > 30) {
    let dinoInterval;
    if (distance < 500) dinoInterval = 8.0;
    else if (distance < 1500) dinoInterval = 4.5;
    else dinoInterval = 2.5;

    dinoSpawnTimer -= dt;
    if (dinoSpawnTimer <= 0) {
      dinoSpawnTimer = dinoInterval + Math.random() * dinoInterval * 0.3;
      enemies.push({
        type: 'dino',
        x: camera.x + canvas.width + 80,
        y: GROUND_Y,
        w: 60, h: 55,
        hp: 3,
        speed: 60 + Math.random() * 30,
        facing: -1,
        points: 50,
      });
    }
  }
}

// === SPAWN PARTICLES ===
function spawnDeathParticles(x, y, color) {
  const count = 8 + Math.floor(Math.random() * 5);
  for (let i = 0; i < count; i++) {
    const angle = (Math.PI * 2 * i) / count + Math.random() * 0.5;
    const speed = 100 + Math.random() * 150;
    particles.push({
      x, y,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed - 50,
      size: 2 + Math.random() * 3,
      life: 1.0,
      color,
    });
  }
}

// === COLLISION HELPERS ===
function rectsOverlap(a, b) {
  return a.x < b.x + b.w && a.x + a.w > b.x && a.y - a.h < b.y && a.y > b.y - b.h;
}

function meleeHitbox() {
  const range = 28;
  return {
    x: player.x + (player.facing === 1 ? player.w / 2 : -range - player.w / 2),
    y: player.y,
    w: range + player.w / 2,
    h: 30,
  };
}

// === UPDATE ===
function update(dt) {
  if (gameState === 'gameOver') {
    if (keys['Enter']) resetGame();
    return;
  }

  gameTime += dt;

  player.vx = 0;
  if (keys['ArrowLeft']) { player.vx = -PLAYER_SPEED; player.facing = -1; }
  if (keys['ArrowRight']) { player.vx = PLAYER_SPEED; player.facing = 1; }
  if (keys['ArrowUp'] && player.onGround) { player.vy = JUMP_FORCE; player.onGround = false; }

  player.vy += GRAVITY * dt;
  player.x += player.vx * dt;
  player.y += player.vy * dt;

  player.onGround = false;
  for (const seg of terrainSegments) {
    if (player.x + player.w > seg.x && player.x < seg.x + seg.w) {
      if (player.y >= seg.y && player.y - player.h < seg.y + seg.h) {
        if (player.vy >= 0) {
          player.y = seg.y;
          player.vy = 0;
          player.onGround = true;
        }
      }
    }
  }

  if (player.y > canvas.height + 50) {
    player.lives--;
    screenShake = 0.3;
    if (player.lives <= 0) {
      endGame();
      return;
    }
    player.y = GROUND_Y - 100;
    player.vy = 0;
    player.invincible = 1.5;
  }

  camera.x = player.x - 250;

  const newDistance = Math.max(distance, player.x / 50);
  score += Math.floor(newDistance) - Math.floor(distance);
  distance = newDistance;

  if (player.invincible > 0) player.invincible -= dt;
  if (player.meleeCooldown > 0) player.meleeCooldown -= dt;
  if (player.meleeTimer > 0) player.meleeTimer -= dt;
  if (player.shootCooldown > 0) player.shootCooldown -= dt;

  if ((keys['z'] || keys['Z']) && player.meleeCooldown <= 0) {
    player.meleeCooldown = 0.3;
    player.meleeTimer = 0.15;
    const hitbox = meleeHitbox();
    enemies.forEach(e => {
      if (rectsOverlap(hitbox, { x: e.x - e.w / 2, y: e.y, w: e.w, h: e.h })) {
        e.hp -= 1;
      }
    });
  }

  if ((keys['x'] || keys['X']) && player.shootCooldown <= 0) {
    player.shootCooldown = 0.5;
    projectiles.push({
      x: player.x + (player.facing === 1 ? player.w : 0),
      y: player.y - 18,
      dir: player.facing,
      speed: 500,
    });
  }

  projectiles.forEach(p => { p.x += p.dir * p.speed * dt; });
  projectiles = projectiles.filter(p => {
    const sx = p.x - camera.x;
    return sx > -50 && sx < canvas.width + 50;
  });

  projectiles = projectiles.filter(p => {
    for (const e of enemies) {
      const ex = e.x - e.w / 2;
      if (p.x > ex && p.x < ex + e.w && p.y > e.y - e.h && p.y < e.y) {
        e.hp -= 2;
        return false;
      }
    }
    return true;
  });

  spawnEnemies(dt);
  generateTerrain();

  enemies.forEach(e => {
    e.x -= e.speed * dt;
  });

  enemies.forEach(e => {
    if (player.invincible > 0) return;
    const playerBox = { x: player.x, y: player.y, w: player.w, h: player.h };
    const enemyBox = { x: e.x - e.w / 2, y: e.y, w: e.w, h: e.h };
    if (rectsOverlap(playerBox, enemyBox)) {
      player.lives--;
      player.invincible = 1.5;
      screenShake = 0.3;
      if (player.lives <= 0) {
        endGame();
      }
    }
  });

  enemies = enemies.filter(e => {
    if (e.hp <= 0) {
      score += e.points;
      spawnDeathParticles(e.x, e.y - e.h / 2, e.type === 'bug' ? COLORS.bug : COLORS.dino);
      return false;
    }
    if (e.x < camera.x - 100) return false;
    return true;
  });

  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vy += 200 * dt;
    p.life -= dt * 1.5;
  });
  particles = particles.filter(p => p.life > 0);

  if (screenShake > 0) screenShake -= dt;
}

// === DRAW ===
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.fillStyle = COLORS.bg;
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  if (screenShake > 0) {
    const shakeX = (Math.random() - 0.5) * screenShake * 20;
    const shakeY = (Math.random() - 0.5) * screenShake * 20;
    ctx.translate(shakeX, shakeY);
  }

  drawParallax();
  drawTerrain();

  enemies.forEach(e => {
    if (e.type === 'bug') drawBeetle(e);
    else drawTRex(e);
  });

  drawProjectiles();
  drawPlayer();
  drawParticles();

  ctx.restore();

  drawHUD();

  if (gameState === 'gameOver') drawGameOver();
}

// === RESET ===
function resetGame() {
  gameState = 'playing';
  score = 0;
  distance = 0;
  gameTime = 0;
  player.x = 200;
  player.y = GROUND_Y - 50;
  player.vx = 0;
  player.vy = 0;
  player.lives = 3;
  player.invincible = 0;
  player.meleeCooldown = 0;
  player.meleeTimer = 0;
  player.shootCooldown = 0;
  player.facing = 1;
  camera.x = 0;
  enemies = [];
  projectiles = [];
  particles = [];
  terrainSegments = [];
  terrainNextX = 0;
  bugSpawnTimer = 2;
  dinoSpawnTimer = 8;
  screenShake = 0;
  generateTerrain();
}

function endGame() {
  gameState = 'gameOver';
  if (score > highScore) {
    highScore = Math.floor(score);
    localStorage.setItem('jungleNeonHighScore', highScore);
  }
}

// === GAME LOOP ===
let lastTime = 0;
function gameLoop(timestamp) {
  const dt = Math.min((timestamp - lastTime) / 1000, 0.05);
  lastTime = timestamp;
  update(dt);
  draw();
  requestAnimationFrame(gameLoop);
}

generateTerrain();
requestAnimationFrame(gameLoop);
</script>
</body>
</html>
